# 按路径自动给 PR 打标签

"area/scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"

"area/ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

"area/config":
  - changed-files:
      - any-glob-to-any-file:
          - "config.yml"
          - ".coderabbit.yaml"
          - ".gitignore"

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "**/docs/**"

"area/tests":
  - changed-files:
      - any-glob-to-any-file:
          - "**/test_*.py"
          - "**/tests/**"
