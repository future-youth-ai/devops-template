# 按路径自动给 PR 打标签 - monorepo 模式

# ---------- 项目标签 (一级分类) ----------
"project/meeting_bot":
  - changed-files:
      - any-glob-to-any-file:
          - "meeting_bot/**"

"project/infra":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "scripts/**"
          - ".coderabbit.yaml"
          - ".gitignore"
          - "README.md"

# ---------- 功能标签 (二级分类) ----------
"area/feishu":
  - changed-files:
      - any-glob-to-any-file:
          - "meeting_bot/src/meeting_bot/feishu/**"
          - "scripts/sync_feishu.py"

"area/webhook":
  - changed-files:
      - any-glob-to-any-file:
          - "meeting_bot/src/meeting_bot/main.py"
          - "meeting_bot/src/meeting_bot/feishu/events.py"

"area/pipeline":
  - changed-files:
      - any-glob-to-any-file:
          - "meeting_bot/src/meeting_bot/pipeline.py"

"area/docker":
  - changed-files:
      - any-glob-to-any-file:
          - "meeting_bot/Dockerfile"
          - "meeting_bot/docker-compose.yml"

"area/tests":
  - changed-files:
      - any-glob-to-any-file:
          - "**/tests/**"
          - "**/test_*.py"

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "**/docs/**"

"area/config":
  - changed-files:
      - any-glob-to-any-file:
          - "**/pyproject.toml"
          - "**/.pre-commit-config.yaml"
          - "**/.env.example"
