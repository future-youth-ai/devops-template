name: Process Meeting Record

# 安全设计:
#   - 所有不可信 issue body 字段通过 env: 块注入, 不在 run: 里直接展开 (避免命令注入)
#   - feishu_url 必须通过 scripts/feishu_url.py 白名单校验 (kind ∈ {minutes,docx,docs,wiki})
#   - LLM 调用对 transcript 不做内容过滤, system prompt 强制 JSON 输出
#   - 所有 secret 通过 GitHub Actions secret 注入, 不进 issue / 归档

on:
  issues:
    types: [opened, labeled, closed]

permissions:
  issues: write

concurrency:
  # 同一 issue 防并发跑
  group: process-meeting-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  process:
    # 幂等保护: 只在以下情况跑, 防止任意事件重复建任务
    #   1. issue opened 且自带 meeting label (Issue Form 提交场景)
    #   2. labeled 动作明确加的就是 meeting label (人工补 label 场景)
    #   3. issue closed 且带 meeting label (手动关闭时仅归档, 排除 bot 自身关闭)
    if: >
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'meeting')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'meeting') ||
      (github.event.action == 'closed' && github.actor != 'github-actions[bot]' && contains(github.event.issue.labels.*.name, 'meeting'))
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
      FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
      LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LLM_BASE_URL: https://api.deepseek.com/v1
      LLM_MODEL: deepseek-chat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install requests openai pydantic pyyaml

      - name: Parse issue form fields
        id: parse
        working-directory: scripts
        run: python parse_meeting_issue.py

      - name: Fetch transcript from Feishu
        if: github.event.action != 'closed'
        id: fetch
        working-directory: scripts
        env:
          FEISHU_URL: ${{ steps.parse.outputs.feishu_url }}
        run: python fetch_transcript_for_workflow.py

      - name: Extract action items via LLM
        if: github.event.action != 'closed'
        id: extract
        working-directory: scripts
        env:
          TRANSCRIPT: ${{ steps.fetch.outputs.transcript }}
        run: python extract_action_items.py

      - name: Create Feishu tasks
        if: github.event.action != 'closed'
        id: tasks
        working-directory: scripts
        env:
          ACTION_ITEMS_JSON: ${{ steps.extract.outputs.action_items }}
          MEETING_DATE: ${{ steps.parse.outputs.meeting_date }}
          REPO_NAME: ${{ github.repository }}
        run: python create_feishu_tasks.py

      - name: Archive to Feishu cloud doc
        id: archive
        working-directory: scripts
        env:
          MEETING_TITLE: ${{ steps.parse.outputs.meeting_title }}
          MEETING_DATE: ${{ steps.parse.outputs.meeting_date }}
          FEISHU_URL: ${{ steps.parse.outputs.feishu_url }}
          ACTION_ITEMS_JSON: ${{ steps.extract.outputs.action_items }}
        run: python archive_meeting.py

      - name: Comment on issue and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_COUNT: ${{ steps.tasks.outputs.task_count }}
          TASK_MD: ${{ steps.tasks.outputs.task_md }}
          ARCHIVE_URL: ${{ steps.archive.outputs.archive_url }}
        run: |
          comment_body=$(cat <<'COMMENT_EOF'
          ✅ 处理完成

          ## 创建了 TASK_COUNT_PLACEHOLDER 个飞书任务

          TASK_MD_PLACEHOLDER

          ## 归档

          [飞书文档](ARCHIVE_URL_PLACEHOLDER)

          ---
          _由 process-meeting workflow 自动生成_
          COMMENT_EOF
          )
          comment_body="${comment_body//TASK_COUNT_PLACEHOLDER/${TASK_COUNT:-0}}"
          comment_body="${comment_body//TASK_MD_PLACEHOLDER/${TASK_MD:-_(无)_}}"
          comment_body="${comment_body//ARCHIVE_URL_PLACEHOLDER/${ARCHIVE_URL:-#}}"
          gh issue comment "$ISSUE_NUMBER" --body "$comment_body"
          gh issue close "$ISSUE_NUMBER"
