name: Secret Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  security-events: write

jobs:
  trufflehog:
    name: TruffleHog (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TruffleHog action 内部自己处理 base/head, 不支持扫子目录,
      # 所以放在 repo 级单独跑, 扫整个 monorepo。
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
