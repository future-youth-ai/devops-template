# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: zh-CN
early_access: false
tone_instructions: |
  你是一位资深的 Python 工程审查员。
  审查意见使用中文, 语气专业、直接、可执行。
  优先级: 安全漏洞 > 数据合规 > 正确性 > 性能 > 代码风格。
  给出具体的代码修改建议, 而不是抽象描述。

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches: [main, dev]

  path_filters:
    - "!**/*.lock"
    - "!**/*.min.js"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.venv/**"
    - "!**/__pycache__/**"
    - "!**/htmlcov/**"
    - "!**/coverage.xml"

  path_instructions:
    # ========== 通用安全 ==========
    - path: "**/*.py"
      instructions: |
        【安全检查 - 最高优先级】
        1. OWASP Top 10: 检查 SQL 注入、XSS、SSRF、路径穿越、不安全反序列化。
        2. 硬编码凭证: 搜索 api_key/secret/token/password 常量赋值;
           检查是否有真实 Key 被写入代码 (应使用 os.environ / config_loader)。
        3. 输入校验: 所有外部输入必须经过 Pydantic 模型或显式校验
           才能进入 shell、LLM prompt、飞书 API。

    # ========== 通用性能 ==========
    - path: "**/*.py"
      instructions: |
        【性能检查】
        1. 避免 N+1 调用模式: 循环内的 HTTP/DB 调用应批量化。
        2. 大列表内存: 避免全量加载, 使用 iterator/流式处理。
        3. 缓存: 计算重、结果稳定的函数考虑 functools.lru_cache。

    # ========== 测试质量 ==========
    - path: "**/test_*.py"
      instructions: |
        【测试质量】
        1. 测试必须有明确的 arrange-act-assert 结构。
        2. 外部 HTTP 调用必须用 responses/respx mock, 禁止真连外部服务。
        3. 关键分支覆盖优先于行覆盖率。

  tools:
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 180000
    gitleaks:
      enabled: true
    semgrep:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
